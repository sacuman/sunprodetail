<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | SUN PRO Car Detailing</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Topbar -->
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="index.html">
      <span class="brand-dot"></span>
      <span class="brand-name">SUN PRO</span>
      <span class="brand-sub">Car Detailing • Wangara</span>
    </a>

    <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav">
      <a href="services.html">Services</a>
      <a href="gallery.html">Gallery</a>
      <a href="locations.html">Locations</a>
      <a href="about.html">About</a>
      <a href="faq.html">FAQ</a>
      <a href="contact.html">Contact</a>

      <a class="btn" href="contact.html">Enquire</a>
      <a class="btn primary" href="contact.html#book">Book</a>
    </nav>
  </div>
</header>

  <main>

    <section class="page-head">
      <div class="container">
        <h1 class="page-title">Gallery</h1>
        <p class="page-sub">Real detailing results from our work in Wangara.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">

        <!-- Refresh Detailing -->
        <div class="gallery-section">
          <h2 class="gallery-title">Refresh Detailing</h2>
          <div class="gallery-layout">
            <div class="gallery-thumbs">
              <img src="images/refresh/r1.jpg" alt="Refresh Detailing 1">
              <img src="images/refresh/r2.jpg" alt="Refresh Detailing 2">
              <img src="images/refresh/r3.jpg" alt="Refresh Detailing 3">
              <img src="images/refresh/r4.jpg" alt="Refresh Detailing 4">
			  <img src="images/refresh/r5.jpg" alt="Refresh Detailing 5">
			  <img src="images/refresh/r6.jpg" alt="Refresh Detailing 6">
			  <img src="images/refresh/r7.jpg" alt="Refresh Detailing 7">
            </div>
            <div class="gallery-main">
              <img src="images/refresh/r1.jpg" alt="Refresh main image">
            </div>
          </div>
        </div>

        <!-- Paint Correction -->
        <div class="gallery-section">
          <h2 class="gallery-title">Paint Correction</h2>
          <div class="gallery-layout">
            <div class="gallery-thumbs">
              <img src="images/correction/c1.jpg" alt="Paint Correction 1">
              <img src="images/correction/c2.jpg" alt="Paint Correction 2">
              <img src="images/correction/c3.jpg" alt="Paint Correction 3">
		      <img src="images/correction/c4.jpg" alt="Paint Correction 4">
              <img src="images/correction/c5.jpg" alt="Paint Correction 5">
              <img src="images/correction/c6.jpg" alt="Paint Correction 6">
            </div>
            <div class="gallery-main">
              <img src="images/correction/c1.jpg" alt="Paint correction main image">
            </div>
          </div>
        </div>

        <!-- Ceramic Coating -->
        <div class="gallery-section">
          <h2 class="gallery-title">Ceramic Coating</h2>
          <div class="gallery-layout">
            <div class="gallery-thumbs">
              <img src="images/ceramic/cc1.jpg" alt="Ceramic Coating 1">
              <img src="images/ceramic/cc2.jpg" alt="Ceramic Coating 2">
              <img src="images/ceramic/cc3.jpg" alt="Ceramic Coating 3">
            </div>
            <div class="gallery-main">
              <img src="images/ceramic/cc1.jpg" alt="Ceramic coating main image">
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>© 2026 SUN PRO Car Detailing</div>
      <div class="footer-links">
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script>
    function setupGallery(section){
      const thumbs = section.querySelectorAll(".gallery-thumbs img");
      const main = section.querySelector(".gallery-main img");

      thumbs.forEach(img => {
        img.addEventListener("click", () => {
          main.src = img.src;
          main.alt = img.alt;
        });
      });
    }

    document.querySelectorAll(".gallery-section").forEach(setupGallery);
  </script>
<script>
  const menuToggle = document.querySelector(".menu-toggle");
  const nav = document.querySelector(".nav");

  if (menuToggle && nav) {
    menuToggle.addEventListener("click", () => {
      nav.classList.toggle("is-open");

      const expanded = nav.classList.contains("is-open");
      menuToggle.setAttribute("aria-expanded", expanded ? "true" : "false");
    });
  }
</script>
</body>
</html>
